language: typescript
version: "1"
patterns:
  - name: interface_declaration
    query: |
      (interface_declaration
        name: (type_identifier) @name
        body: (interface_body) @body)
    captures:
      - name: name
        role: ts_interface_name
      - name: body
        role: ts_interface_body
  - name: interface_extends
    query: |
      (interface_declaration
        name: (type_identifier) @name
        (extends_type_clause
          (type_identifier) @parent))
    captures:
      - name: name
        role: ts_interface_name
      - name: parent
        role: ts_interface_parent
