language: javascript
version: "1"
patterns:
  - name: datastar_on_signal
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @ds
          property: (property_identifier) @fn
          (#eq? @fn "onSignal"))
        arguments: (arguments
          (string) @signal_name
          (_) @handler))
    captures:
      - name: signal_name
        role: datastar_signal
      - name: handler
        role: signal_handler
