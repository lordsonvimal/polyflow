language: javascript
version: "1"
patterns:
  - name: axios_request
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          (#eq? @obj "axios")
          property: (property_identifier) @method
          (#match? @method "^(get|post|put|patch|delete|head|options|request)$"))
        arguments: (arguments
          .
          (_) @url))
    captures:
      - name: method
        role: http_method
      - name: url
        role: http_url
