language: javascript
version: "1"
patterns:
  - name: add_event_listener
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @fn
          (#eq? @fn "addEventListener"))
        arguments: (arguments
          (string) @event_type
          (_) @handler . _*))
    captures:
      - name: event_type
        role: dom_event_type
      - name: handler
        role: event_handler
  # DOM property handlers: el.onclick = fn, input.oninput = …
  # onmessage is excluded — it belongs to the WebSocket/EventSource patterns
  # (ws_onmessage_assign), which classify it as a subscriber.
  - name: dom_event_prop_assign
    query: |
      (assignment_expression
        left: (member_expression
          property: (property_identifier) @prop
          (#match? @prop "^on[a-z]+$")
          (#not-eq? @prop "onmessage"))
        right: (_) @handler)
    captures:
      - name: prop
        role: dom_event_type
      - name: handler
        role: event_handler
  - name: remove_event_listener
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @fn
          (#eq? @fn "removeEventListener"))
        arguments: (arguments
          (string) @event_type
          (_) @handler))
    captures:
      - name: event_type
        role: dom_event_type
