language: javascript
version: "1"
patterns:
  # @_def spans the whole declaration so the matcher can record where the
  # body ends (containment-based enclosing-function attribution).
  - name: function_decl
    query: |
      (function_declaration
        name: (identifier) @name) @_def
    captures:
      - name: name
        role: func_name
  - name: arrow_func_var
    query: |
      (lexical_declaration
        (variable_declarator
          name: (identifier) @name
          value: (arrow_function))) @_def
    captures:
      - name: name
        role: func_name
