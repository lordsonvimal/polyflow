language: jsx
version: "1"
patterns:
  # Detect any plain-identifier function call (e.g. fetchWarnings(), cytoscapeToStore())
  # inside a function body. Captures the callee name so MatchToGraph Pass 3 can emit a
  # calls edge from the enclosing function to the referenced function in the same file.
  # This query uses only call_expression + identifier which exist in all JS/TS grammars.
  - name: component_fn_call
    query: |
      (call_expression
        function: (identifier) @callee
        (#match? @callee "^[a-z]"))
    captures:
      - name: callee
        role: func_ref
  # Detect JSX event-prop function references: onClick={loadSource}, onSubmit={handleForm}, etc.
  # These are prop references (not direct calls), so component_fn_call misses them.
  # Requires the TSX grammar (jsx_attribute node only exists there).
  - name: jsx_event_handler_ref
    query: |
      (jsx_attribute
        (property_identifier) @prop
        (#match? @prop "^on[A-Z]")
        (jsx_expression
          (identifier) @callee))
    captures:
      - name: callee
        role: func_ref
