language: jsx
version: "1"
patterns:
  # Forms with an explicit method: <form action="/save" method="post">.
  # Two entries cover both attribute orders; listed before the generic
  # pattern so the method-aware node wins the http_client dedup.
  - name: nav_link_form
    query: |
      (jsx_opening_element
        (jsx_attribute
          (property_identifier) @prop
          (#eq? @prop "action")
          (string
            (string_fragment) @path
            (#match? @path "^/")))
        (jsx_attribute
          (property_identifier) @mprop
          (#eq? @mprop "method")
          (string
            (string_fragment) @method)))
    captures:
      - name: path
        role: http_path
      - name: method
        role: http_method
  - name: nav_link_form
    query: |
      (jsx_opening_element
        (jsx_attribute
          (property_identifier) @mprop
          (#eq? @mprop "method")
          (string
            (string_fragment) @method))
        (jsx_attribute
          (property_identifier) @prop
          (#eq? @prop "action")
          (string
            (string_fragment) @path
            (#match? @path "^/"))))
    captures:
      - name: path
        role: http_path
      - name: method
        role: http_method
  # Navigation links in JSX: <a href="/reports">, <form action="/save">.
  # Only root-relative paths — external URLs and fragments are not part of
  # the app's own flow. The linker emits navigates_to edges to the matching
  # route handler (nav_link meta keeps them out of the API-call linking).
  - name: nav_link_jsx
    query: |
      (jsx_attribute
        (property_identifier) @prop
        (#match? @prop "^(href|action)$")
        (string
          (string_fragment) @path
          (#match? @path "^/")))
    captures:
      - name: prop
        role: nav_attr
      - name: path
        role: http_path

  # G.6 shape (a): ternary href — <a href={cond ? "/admin" : "/dashboard"}>.
  # Both branches must be root-relative string literals. MatchToGraph assembles
  # branch_0 + branch_1 into key_candidates meta for engine fan-out.
  - name: nav_link_jsx_ternary
    query: |
      (jsx_attribute
        (property_identifier) @prop
        (#match? @prop "^(href|action)$")
        (jsx_expression
          (ternary_expression
            consequence: (string (string_fragment) @branch_0)
            alternative: (string (string_fragment) @branch_1))))
    captures:
      - name: prop
        role: nav_attr
      - name: branch_0
        role: key_branch
      - name: branch_1
        role: key_branch

  # G.6 shape (c): dynamic href expression — <a href={someVar}> or <a href={fn()}>
  # Matches identifier / member / call / binary / template in JSX position.
  # MatchToGraph stamps key_dynamic=true; engine surfaces to dynamic_url ledger.
  - name: nav_link_jsx_dynamic
    query: |
      (jsx_attribute
        (property_identifier) @prop
        (#match? @prop "^(href|action)$")
        (jsx_expression
          [
            (identifier) @key_expr
            (member_expression) @key_expr
            (call_expression) @key_expr
            (binary_expression) @key_expr
            (template_string) @key_expr
          ]))
    captures:
      - name: prop
        role: nav_attr
      - name: key_expr
        role: dynamic_key
