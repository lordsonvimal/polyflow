# Gin route registrations, groups, middleware, and request/response shapes.
#
# Gate: only activates for services that depend on gin. Shapes like
# `r.Use(mw)` and `g.Group(...)` exist in other routers (chi, echo); the
# dependency gate is what disambiguates them, per the version-aware
# pattern-matching design.
language: go
version: "1"
package: github.com/gin-gonic/gin
patterns:
  # r.GET("/users", listUsers) / api.POST("/games/:id", h) — engine or group.
  # Gin verbs are ALL-CAPS, which distinguishes them from chi's Get/Post.
  - name: gin_route
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @router
          field: (field_identifier) @method
          (#match? @method "^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any)$"))
        arguments: (argument_list
          (interpreted_string_literal) @path
          (_) @handler))
    captures:
      - name: method
        role: http_method
      - name: path
        role: http_path
      - name: handler
        role: handler_ref

  # r.Match([]string{"GET", "HEAD"}, "/health", handler) — multi-method
  # registration (gotify's health endpoint). The method set lives in a slice
  # literal we don't enumerate; the node keeps the raw "Match" verb — the
  # handler edge is what recall needs, not the exact method list.
  - name: gin_route_match
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @router
          field: (field_identifier) @method
          (#eq? @method "Match"))
        arguments: (argument_list
          (composite_literal)
          .
          (interpreted_string_literal) @path
          (_) @handler))
    captures:
      - name: method
        role: http_method
      - name: path
        role: http_path
      - name: handler
        role: handler_ref

  # g.Group("/user").Use(mw).POST("", handler) — inline chained registration
  # where the receiver is a call chain, not a variable (gotify's user routes).
  # The Group prefix sits at arbitrary chain depth, so the full path is not
  # reconstructed — the handler edge is the recall-critical part.
  - name: gin_route_chained
    query: |
      (call_expression
        function: (selector_expression
          operand: (call_expression) @chain
          field: (field_identifier) @method
          (#match? @method "^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any)$"))
        arguments: (argument_list
          (interpreted_string_literal) @path
          (_) @handler))
    captures:
      - name: method
        role: http_method
      - name: path
        role: http_path
      - name: handler
        role: handler_ref

  # api := r.Group("/api/v1") — route group assigned to a variable.
  # Captures the variable name and parent receiver so the pre-engine
  # enrichment pass (G.3) can reconstruct full paths for nested routes.
  # chi's Group takes a func literal (not a string) so this shape is gin's;
  # un-assigned inline chaining (r.Group("/p").GET(...)) is not captured here
  # because the receiver would not be a simple identifier.
  - name: gin_route_group
    query: |
      (short_var_declaration
        (expression_list
          (identifier) @var_name)
        (expression_list
          (call_expression
            function: (selector_expression
              operand: (identifier) @receiver
              field: (field_identifier) @method
              (#eq? @method "Group"))
            arguments: (argument_list
              .
              (interpreted_string_literal) @prefix))))
    captures:
      - name: var_name
        role: group_var
      - name: receiver
        role: group_receiver
      - name: prefix
        role: route_prefix

  # r.Use(authMiddleware()) — middleware registration.
  - name: gin_middleware_use
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @router
          field: (field_identifier) @fn
          (#eq? @fn "Use"))
        arguments: (argument_list
          (_) @middleware))
    captures:
      - name: middleware
        role: middleware_ref

  # c.ShouldBindJSON(&req) — request shape extraction: which struct the
  # handler expects.
  - name: gin_bind_request
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @ctx
          field: (field_identifier) @fn
          (#match? @fn "^(ShouldBindJSON|BindJSON|ShouldBind|ShouldBindQuery|ShouldBindUri|ShouldBindHeader)$"))
        arguments: (argument_list
          (unary_expression) @target))
    captures:
      - name: fn
        role: bind_kind
      - name: target
        role: request_shape

  # c.JSON(200, resp) — response shape extraction.
  - name: gin_json_response
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @ctx
          field: (field_identifier) @fn
          (#eq? @fn "JSON"))
        arguments: (argument_list
          .
          (_) @status
          .
          (_) @body))
    captures:
      - name: status
        role: http_status
      - name: body
        role: response_shape
