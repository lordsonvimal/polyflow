language: go
version: "1"
patterns:
  # @_def spans the whole declaration so the matcher can record where the
  # body ends (containment-based enclosing-function attribution).
  - name: func_decl
    query: |
      (function_declaration
        name: (identifier) @name) @_def
    captures:
      - name: name
        role: func_name
  # The receiver type is captured so the containment linker can draw the
  # struct→method `contains` edge (pointer and value receivers both resolve to
  # the bare type identifier).
  - name: method_decl
    query: |
      (method_declaration
        receiver: (parameter_list
          (parameter_declaration
            type: [
              (type_identifier) @receiver
              (pointer_type (type_identifier) @receiver)
            ]))
        name: (field_identifier) @name) @_def
    captures:
      - name: name
        role: method_name
      - name: receiver
        role: receiver_type
