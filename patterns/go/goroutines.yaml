language: go
version: "1"
patterns:
  - name: goroutine_call
    query: |
      (go_statement
        (call_expression
          function: (identifier) @callee))
    captures:
      - name: callee
        role: goroutine_callee
  - name: goroutine_call
    query: |
      (go_statement
        (call_expression
          function: (selector_expression
            field: (field_identifier) @callee)))
    captures:
      - name: callee
        role: goroutine_callee
