language: go
version: "1"
patterns:
  - name: go_named_call
    query: |
      (go_statement
        (call_expression
          function: (identifier) @fn))
    captures:
      - name: fn
        role: goroutine_fn
  - name: go_method_call
    query: |
      (go_statement
        (call_expression
          function: (selector_expression
            field: (field_identifier) @fn)))
    captures:
      - name: fn
        role: goroutine_fn
