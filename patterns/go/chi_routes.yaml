language: go
version: "1"
patterns:
  - name: chi_get
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @router
          (#not-eq? @router "http")
          field: (field_identifier) @method
          (#match? @method "^(Get|Post|Put|Patch|Delete|Head|Options)$"))
        arguments: (argument_list
          (interpreted_string_literal) @path
          (_) @handler))
    captures:
      - name: method
        role: http_method
      - name: path
        role: http_path
      - name: handler
        role: handler_ref
  # r.Route("/admin", func(r chi.Router) { ... }) — route group via inline
  # function literal. Captures receiver + prefix for the enrichment pass (G.3);
  # @_body is a positional span capture so the func_literal end line is stored
  # in MatchResult.EndLine → meta["end_line"], enabling line-range containment.
  - name: chi_route_group
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @receiver
          field: (field_identifier) @method
          (#eq? @method "Route"))
        arguments: (argument_list
          (interpreted_string_literal) @prefix
          (func_literal) @_body))
    captures:
      - name: receiver
        role: group_receiver
      - name: prefix
        role: route_prefix
