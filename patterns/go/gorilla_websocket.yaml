# gorilla/websocket server-side shapes (dsw-manager), written against the
# canonical gorilla chat-example API (upgrader.Upgrade + read/write pumps).
# If dsw-manager's real call sites diverge, update the fixtures from a
# redacted snippet.
language: go
version: "1"
package: github.com/gorilla/websocket
patterns:
  # conn, err := upgrader.Upgrade(w, r, nil)
  - name: ws_upgrade
    query: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @fn
          (#eq? @fn "Upgrade"))
        arguments: (argument_list
          .
          (_) @writer
          .
          (_) @request
          .
          (_) @header))
    captures:
      - name: fn
        role: ws_upgrade

  # Read pump: conn.ReadMessage() / conn.ReadJSON(&msg)
  - name: ws_read_pump
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @conn
          field: (field_identifier) @fn
          (#match? @fn "^(ReadMessage|ReadJSON|NextReader)$"))
        arguments: (argument_list) @args)
    captures:
      - name: fn
        role: ws_read

  # Write pump: conn.WriteMessage(mt, data) / conn.WriteJSON(v)
  - name: ws_write_pump
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @conn
          field: (field_identifier) @fn
          (#match? @fn "^(WriteMessage|WriteJSON|NextWriter|WritePreparedMessage)$"))
        arguments: (argument_list) @args)
    captures:
      - name: fn
        role: ws_write

  # switch msg.Type { case "battery": ... } — typed-JSON dispatch after a
  # read pump, one match per case (mirrors the JS ws_dispatch_case shape so
  # LinkWebSocketMessages joins client sends to server cases by type).
  # Anchored on a .Type/.MsgType/.Kind field selector so ordinary string
  # switches cannot match.
  - name: ws_dispatch_case
    query: |
      (expression_switch_statement
        value: (selector_expression
          field: (field_identifier) @field
          (#match? @field "^(Type|MsgType|Kind)$"))
        (expression_case
          value: (expression_list
            (interpreted_string_literal) @message_type)))
    captures:
      - name: message_type
        role: ws_message_type

  # conn.WriteJSON(Ack{Type: "battery_ack"}) — typed outbound message; the
  # literal Type value links the server write back to the client dispatch.
  - name: ws_send_typed
    query: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @fn
          (#eq? @fn "WriteJSON"))
        arguments: (argument_list
          (composite_literal
            body: (literal_value
              (keyed_element
                (literal_element (identifier) @key)
                (#eq? @key "Type")
                (literal_element (interpreted_string_literal) @message_type))))))
    captures:
      - name: message_type
        role: ws_message_type
