language: go
version: "1"
patterns:
  - name: http_get
    query: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @pkg
          field: (field_identifier) @fn
          (#eq? @fn "Get"))
        arguments: (argument_list
          (_) @url))
    captures:
      - name: url
        role: http_url
  - name: http_post
    query: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @fn
          (#eq? @fn "Post"))
        arguments: (argument_list
          .
          (_) @url
          .
          (_) @content_type
          .
          (_) @body))
    captures:
      - name: url
        role: http_url
  - name: http_new_request
    query: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @fn
          (#eq? @fn "NewRequest"))
        arguments: (argument_list
          .
          (_) @method
          .
          (_) @url
          .
          (_) @body))
    captures:
      - name: method
        role: http_method
      - name: url
        role: http_url
