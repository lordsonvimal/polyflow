repo:
  name: polyflow
  path: .                    # local repo — no clone needed
  sha: 792a1ebac2319edd8f48ba1bd28fb5281f5c8057
  workspace: workspace.yaml

# Hand-verified ground truth: each case was verified by reading the source
# code (grep/read), never by running polyflow itself (circular truth).
cases:
  - id: unresolved-note-callers
    kind: node
    target: UnresolvedNote
    # graph.UnresolvedNote (internal/graph/unresolved.go) is called by these files.
    # Verified: grep -rn "UnresolvedNote" internal/ shows calls in all five files.
    expected_impacted:
      - internal/impact/impact.go
      - internal/impact/file.go
      - internal/impact/diff.go
      - internal/trace/trace.go
      - internal/context/builder.go
      - internal/context/files.go
    must_not_miss:
      - internal/impact/impact.go
      - internal/trace/trace.go

  - id: linker-route-indexer
    kind: node
    target: LinkRouteHandlers
    # linker.LinkRouteHandlers (internal/linker/linker.go) is called only by the
    # indexer's Run function.  Verified: grep -rn "LinkRouteHandlers" shows
    # a single call site at internal/indexer/indexer.go.
    expected_impacted:
      - internal/indexer/indexer.go
    must_not_miss:
      - internal/indexer/indexer.go

  - id: filter-edges-confidence-js
    kind: node
    target: filterEdgesByConfidence
    # filterEdgesByConfidence (web/src/lib/confidence.ts) is imported and called by
    # web/src/stores/derived.ts.  Verified: derived.ts line 10 imports it; line 53
    # calls it. This is a cross-file JavaScript link — the Phase 0.3 class of fix.
    expected_impacted:
      - web/src/stores/derived.ts
    must_not_miss:
      - web/src/stores/derived.ts

  # ── Semantic search cases (S.4) ───────────────────────────────────────────
  # Verified by running `polyflow search <query> --format json` on this repo
  # at its current indexed state and confirming the expected label appears in
  # the top-10 nodes section. Entity labels are the name component of node IDs
  # (format: service:file:type:name:line → name), stable across line changes.

  - id: nl-unresolved-note
    kind: semantic
    query: "UnresolvedNote graph ledger builder"
    section: nodes
    # Verified: `polyflow search` returns UnresolvedNote at position 1 (exact match).
    # internal/graph/unresolved.go defines the UnresolvedNote function.
    expect_any_of:
      - UnresolvedNote
    must_not_miss:
      - UnresolvedNote

  - id: nl-link-route-handlers
    kind: semantic
    query: "LinkRouteHandlers wiring indexer"
    section: nodes
    # Verified: `polyflow search` returns LinkRouteHandlers at position 1 (exact match).
    # internal/linker/linker.go defines LinkRouteHandlers.
    expect_any_of:
      - LinkRouteHandlers
    must_not_miss:
      - LinkRouteHandlers

  - id: nl-search-nodes-store
    kind: semantic
    query: "SearchNodes graph store lookup"
    section: nodes
    # Verified: `polyflow search` returns SearchNodes at position 1 (exact match).
    # internal/graph/store.go defines SearchNodes.
    expect_any_of:
      - SearchNodes
    must_not_miss:
      - SearchNodes

  - id: nl-confidence-filter-js
    kind: semantic
    query: "confidence filter edges javascript"
    section: nodes
    # Verified: `polyflow search` returns filterEdgesByConfidence at position 1 (lexical match).
    # web/src/lib/confidence.ts defines filterEdgesByConfidence.
    expect_any_of:
      - filterEdgesByConfidence
    must_not_miss:
      - filterEdgesByConfidence

  - id: nl-adjacency-index
    kind: semantic
    query: "AdjacencyIndex traversal builder"
    section: nodes
    # Verified: `polyflow search` returns AdjacencyIndex at position 1 (exact match).
    # internal/graph/model.go defines AdjacencyIndex.
    expect_any_of:
      - AdjacencyIndex
    must_not_miss:
      - AdjacencyIndex
