name: lobsters
version: "1"
services:
  - name: app
    path: .
    language: ruby
    frameworks:
      - rails
  - name: assets
    path: ./app/javascript
    language: javascript
links: []
index:
  exclude:
    - '**/node_modules/**'
    - '**/vendor/**'
    - '**/db/schema.rb'
    - '**/db/migrate/**'
    - 'Gemfile.lock'
