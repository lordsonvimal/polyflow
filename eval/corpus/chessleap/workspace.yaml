name: chessleap
version: "1"
services:
  - name: api
    path: .
    language: go
    frameworks:
      - gin
      - datastar
      - templ
  - name: web
    path: ./web
    language: javascript
links: []
index:
  exclude:
    - '**/node_modules/**'
    - '**/vendor/**'
    - '**/dist/**'
    - '**/*_test.go'
