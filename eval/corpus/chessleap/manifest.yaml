repo:
  name: chessleap
  # Private repo: the author's benchmark application. Clone (or symlink) to
  # eval/.cache/chessleap and run `polyflow index --full` before running eval.
  # make eval-corpus skips path-based repos.
  path: eval/.cache/chessleap
  sha: 7a74e0e06b2259ddea2cfe48136d5fd7f1a7ec13
  workspace: workspace.yaml

# Selection rationale: chessleap is the repository used for all
# BenchmarkIndexCold timing, the golden contract-edge snapshot
# (internal/contract/testdata/golden/), and datastar action coverage. It is
# the only test bed exercising gin + datastar SSE + templ + vanilla-JS
# modules in a single codebase, so it measures exactly the cross-language
# linking the contract engine exists for.
#
# Verification method (E.2 rule: ground truth is human-verified, never
# generated by polyflow): every expected_impacted file was established by
# grep + reading the checkout at the pinned sha. Comment-only mentions were
# checked and excluded (e.g. hubBroadcastBoard is mentioned in a comment in
# server/practice_sse.go and ui/pages/playgame.templ — neither is listed).
# Expected lists are the verified subset of the blast radius, not an
# exhaustive closure — extra returned files lower precision, not recall.
cases:
  # ── datastar action → gin handler (templ → Go), the flagship G.1/G.3 link.
  # Each handler is registered in server/routes.go under the /play route
  # group and invoked from a templ component via a datastar @post action.

  - id: propose-draw-datastar
    kind: node
    target: ProposeDraw
    # def server/play_handlers.go:908; registered routes.go ("/:gameID/draw");
    # datastar action ui/components/gametoolspanel.templ:55
    #   data-on:click @post('/play/<id>/draw')
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/gametoolspanel.templ
    must_not_miss:
      - ui/components/gametoolspanel.templ

  - id: resign-game-datastar
    kind: node
    target: ResignGame
    # def server/play_handlers.go:866; routes.go ("/:gameID/resign");
    # ui/components/playtoolspanel.templ:44 @post('/play/<id>/resign')
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/playtoolspanel.templ
    must_not_miss:
      - ui/components/playtoolspanel.templ

  - id: accept-draw-datastar
    kind: node
    target: AcceptDraw
    # def server/play_handlers.go:962; routes.go ("/:gameID/draw/accept");
    # ui/components/playtoolspanel.templ:61 @post('/play/<id>/draw/accept')
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/playtoolspanel.templ
    must_not_miss:
      - ui/components/playtoolspanel.templ

  - id: propose-takeback-datastar
    kind: node
    target: ProposeTakeback
    # def server/play_handlers.go:1031; routes.go ("/:gameID/takeback");
    # ui/components/gametoolspanel.templ:70 @post('/play/<id>/takeback')
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/gametoolspanel.templ
    must_not_miss:
      - ui/components/gametoolspanel.templ

  - id: claim-draw-datastar
    kind: node
    target: ClaimDraw
    # def server/play_handlers.go:667; routes.go ("/:gameID/claim-draw");
    # ui/components/gametoolspanel.templ:86 @post('/play/<id>/claim-draw')
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/gametoolspanel.templ
    must_not_miss:
      - ui/components/gametoolspanel.templ

  - id: decline-rematch-datastar
    kind: node
    target: DeclineRematch
    # def server/play_handlers.go:838; routes.go ("/:gameID/rematch/decline");
    # ui/components/playtoolspanel.templ:22 and :147 @post(...rematch/decline)
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/components/playtoolspanel.templ
    must_not_miss:
      - ui/components/playtoolspanel.templ

  - id: play-events-sse
    kind: node
    target: PlayEventsHandler
    # SSE endpoint: def server/play_handlers.go:363; routes.go
    # ("/play/:gameID/events"); subscribed from ui/pages/playgame.templ:18
    # via data-init @get('/play/<id>/events').
    expected_impacted:
      - server/play_handlers.go
      - server/routes.go
      - ui/pages/playgame.templ
    must_not_miss:
      - ui/pages/playgame.templ

  # ── Go-internal blast radius (calls across packages).

  - id: apply-move-checked-callers
    kind: node
    target: ApplyMoveChecked
    # def game/game.go:648 (method on *Game); called from server/sse.go:225
    # and game/apply_move_checked_test.go. The comment mention in
    # ui/ui_store/chessboard_signals.go:125 is excluded (not a reference).
    expected_impacted:
      - game/game.go
      - server/sse.go
      - game/apply_move_checked_test.go
    must_not_miss:
      - server/sse.go

  - id: hub-broadcast-board-callers
    kind: node
    target: hubBroadcastBoard
    # def server/sse.go:81; called from server/play_handlers.go:1136.
    # practice_sse.go:42 mentions it only in a comment — excluded.
    expected_impacted:
      - server/sse.go
      - server/play_handlers.go
    must_not_miss:
      - server/play_handlers.go

  - id: broadcast-signals-callers
    kind: node
    target: BroadcastSignals
    # single def game/hub.go:111 (*GameHub); practice sessions embed
    # *game.GameHub (practice/session.go:215) so all these are true callers:
    # server/analysis.go:33,38,87,178; server/practice_save.go:98;
    # server/practice_coach.go:45; server/practice_handlers.go:434,482.
    expected_impacted:
      - game/hub.go
      - server/analysis.go
      - server/practice_save.go
      - server/practice_coach.go
      - server/practice_handlers.go
    must_not_miss:
      - server/analysis.go

  - id: new-game-store-callers
    kind: node
    target: NewGameStore
    # def store/gamestore.go:36; wired in main.go (app entry point).
    expected_impacted:
      - store/gamestore.go
      - main.go
    must_not_miss:
      - main.go

  - id: new-dispatcher-callers
    kind: node
    target: NewDispatcher
    # def notifications/worker/dispatcher.go:48; constructed in
    # notifications/module.go:94.
    expected_impacted:
      - notifications/worker/dispatcher.go
      - notifications/module.go
    must_not_miss:
      - notifications/module.go

  # ── JS module graph (ESM imports between assets/js files, Tier I.3).

  - id: post-move-queue-js
    kind: node
    target: createPostMoveQueue
    # def assets/js/move-sync.js; imported+called by assets/js/board.js:12
    # and assets/js/move-sync.test.js:2.
    expected_impacted:
      - assets/js/move-sync.js
      - assets/js/board.js
      - assets/js/move-sync.test.js
    must_not_miss:
      - assets/js/board.js

  - id: arrow-layer-js
    kind: node
    target: createArrowLayer
    # def assets/js/arrows.js; imported+called by assets/js/board-arrows.js:15
    # and assets/js/learn-board.js:10,492.
    expected_impacted:
      - assets/js/arrows.js
      - assets/js/board-arrows.js
      - assets/js/learn-board.js
    must_not_miss:
      - assets/js/board-arrows.js

  - id: move-sync-file-imports
    kind: file
    target: assets/js/move-sync.js
    # File-level first hop (I.3 imports edges): board.js and move-sync.test.js
    # both import ./move-sync.js.
    expected_impacted:
      - assets/js/board.js
      - assets/js/move-sync.test.js
    must_not_miss:
      - assets/js/board.js
