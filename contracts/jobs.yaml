# contracts/jobs.yaml — background job dispatch rules.
# Links enqueue sites to the job/task class or function that handles them.
# Each rule targets a specific framework; the key differentiates which job
# the dispatch resolves to.
version: "1"
contracts:
  # ActiveJob: ClassName.perform_later → class ReportJob < ApplicationJob ... def perform
  - kind: job
    producer:
      node: publisher
      where: {pattern: aj_perform_later}
      key: [job_class]
    consumer:
      node: subscriber
      where: {pattern: aj_perform_method}
      key: [job_class]
    normalizers: [quote_strip]
    match: [exact, normalized]
    edge:
      type: job_enqueue
      id_prefix: job
      same_service: keep          # allow cross-service job dispatch
    unmatched: ledger             # unlinked enqueue sites are surfaced

  # Celery: task.delay(args) → @app.task def task(args)
  - kind: job
    producer:
      node: publisher
      where: {pattern: celery_task_delay}
      key: [name]
    consumer:
      node: subscriber
      where: {pattern: celery_task_decorator}
      key: [name]
    normalizers: [quote_strip]
    match: [exact, normalized]
    edge:
      type: job_enqueue
      id_prefix: job
      same_service: keep
    unmatched: ledger

  # Celery: task.apply_async(args, kwargs) → @app.task def task(args)
  - kind: job
    producer:
      node: publisher
      where: {pattern: celery_apply_async}
      key: [name]
    consumer:
      node: subscriber
      where: {pattern: celery_task_decorator}
      key: [name]
    normalizers: [quote_strip]
    match: [exact, normalized]
    edge:
      type: job_enqueue
      id_prefix: job
      same_service: keep
    unmatched: ledger
