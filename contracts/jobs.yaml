# contracts/jobs.yaml — ports LinkJobQueues for ActiveJob.
# Matches perform_later enqueue sites to the job class's perform method.
# Key is job_class (a Ruby constant like "ReportJob"); quote_strip removes
# any surrounding quotes from captured literals.
#
# Delayed::Job and Sidekiq patterns do not capture job_class in a compatible
# meta field and are not matched here (same limitation as the bespoke linker).
version: "1"
contracts:
  # ActiveJob: ClassName.perform_later → class ReportJob < ApplicationJob ... def perform
  - kind: job
    producer:
      node: publisher
      where: {pattern: aj_perform_later}
      key: [job_class]
    consumer:
      node: subscriber
      where: {pattern: aj_perform_method}
      key: [job_class]
    normalizers: [quote_strip]
    match: [exact, normalized]
    edge:
      type: job_enqueue
      id_prefix: job
      same_service: keep          # allow cross-service job dispatch
    unmatched: ledger             # unlinked enqueue sites are surfaced
