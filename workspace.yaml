version: "1"
services:
  - name: api-gateway
    path: ./services/api-gateway
    language: go
    port: 8080
  - name: user-service
    path: ./services/user-service
    language: go
    port: 8081
  - name: frontend
    path: ./frontend
    language: javascript
    port: 3000
links:
  - from: frontend
    to: api-gateway
    hint: "HTTP_BASE_URL=http://localhost:8080"
  - from: api-gateway
    to: user-service
    hint: "USER_SERVICE_URL=http://localhost:8081"
