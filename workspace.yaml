name: polyflow
version: "1"
services:
    - name: polyflow
      path: .
      language: go
      frameworks:
        - templ
    - name: web
      path: ./web
      language: javascript
      frameworks:
        - solid
links: []
index:
    exclude:
        - '**/node_modules/**'
        - '**/vendor/**'
        - '**/dist/**'
        - '**/testdata/**'
        - '**/*_test.go'
        - '**/spec/**'
        - '**/tmp/**'
settings:
    snippet_lines: 0
    default_layout: ""
    default_depth: 0
    port: 0
